events {
    worker_connections 1024;
}

http {
    server {
        listen 80;

        # 1. 抽獎系統
        location /lottery/ {
            proxy_pass https://lottery-609981588827.asia-east1.run.app/;
            proxy_set_header Host lottery-609981588827.asia-east1.run.app;
        }

        # 2. 名片系統
        location /id_card/ {
            proxy_pass https://ochatsuki-id-name-609981588827.asia-east1.run.app/;
            proxy_set_header Host ochatsuki-id-name-609981588827.asia-east1.run.app;
        }

        # 3. 發貨系統
        location /order/ {
            proxy_pass https://ochatsuki-order-609981588827.asia-northeast1.run.app/;
            proxy_set_header Host ochatsuki-order-609981588827.asia-northeast1.run.app;
        }

        # 預設首頁 (如果只打 client.xxx.com.tw)
        location / {
            default_type text/plain;
            charset utf-8;
            return 200 "茶月食品有限公司";
        }
    }
}